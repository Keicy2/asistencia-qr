server.port=8443

spring.datasource.url=jdbc:h2:file:./data/asistencia;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=asistencia-qr-secret-key-change-in-production
jwt.expiration-ms=86400000

server.ssl.enabled=true
server.ssl.key-store=${keystore.path:keystore.p12}
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=${keystore.password:asistenciaqr}
server.ssl.key-alias=asistenciaqr

